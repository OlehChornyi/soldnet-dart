name: soldnet
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  riverpod: ^3.3.2
  flutter_riverpod: ^3.3.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.3
  freezed_annotation: ^3.1.0
  flutter_svg: ^2.3.0
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.1.1
  flip_card: ^0.7.0
  audioplayers: ^6.8.1
  carousel_slider: ^5.1.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.3
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.4
  json_serializable: ^6.12.0
  freezed: ^3.2.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/prints/
    - assets/images/app_icon/
    - assets/images/splash_screen/
    - assets/images/redirection_page/
    - assets/images/profile/
    - assets/images/chat/
    - assets/images/home/
    - assets/icons/
    - assets/icons/general/
    - assets/icons/profile/
    - assets/icons/home/
    - assets/icons/common/
    - assets/sounds/guns/

flutter_launcher_icons:
  image_path: "assets/images/app_icon/icon.png" 
  android: true
  ios: true
  remove_alpha_ios: true

flutter_native_splash:
  color: "#A5AB90"
  image: "assets/images/splash_screen/splash.png"
  android: true
  ios: true